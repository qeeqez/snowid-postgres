name: SnowID Extension

on:
  pull_request:
    branches: [ main ]
  workflow_call:
    inputs:
      publish_images:
        description: "Whether to publish images to Docker Hub"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compile:
    name: ⚙️ Compile (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      matrix:
        pg_major: [ 18 ]
        arch: [ amd64, arm64 ]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: ⚡️ Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}-${{ matrix.pg_major }}

      - name: 🐘 Install PostgreSQL Headers
        run: |
          sudo apt-get install -y postgresql-common ca-certificates
          sudo YES=1 /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            postgresql-${{ matrix.pg_major }} \
            postgresql-server-dev-${{ matrix.pg_major }} \
            clang gcc make pkg-config

      - name: 🏷️ Get PGRX Version
        id: pgrx-version
        run: |
          PGRX_VER=$(grep -m 1 '^pgrx = ' Cargo.toml | cut -d '"' -f 2)
          echo "version=$PGRX_VER" >> $GITHUB_OUTPUT

      - name: ⚡️ Cache cargo-pgrx binary
        id: cache-pgrx
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-pgrx-${{ steps.pgrx-version.outputs.version }}

      - name: 📦 Install cargo-pgrx
        if: steps.cache-pgrx.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version ${{ steps.pgrx-version.outputs.version }} --locked

      - name: 🚀 Initialize pgrx
        run: cargo pgrx init --pg${{ matrix.pg_major }} $(which pg_config)

      - name: 🔎 Lint (Clippy)
        run: cargo clippy -- -D warnings

      - name: 🧪 Run Tests
        run: cargo pgrx test pg${{ matrix.pg_major }}

      - name: 🔨 Build Extension
        run: cargo pgrx package

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ext-package-${{ matrix.pg_major }}-${{ matrix.arch }}
          path: target/release/pg_snowid-pg${{ matrix.pg_major }}/
          retention-days: 1

  build_and_push:
    name: 🐳 Build and Publish
    needs: compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg_provider: [ pg, cloudnative-pg ]
        pg_version:
          - { major: 18, minor: 1, is_latest: false }
          - { major: 18, minor: 2, is_latest: false }
          - { major: 18, minor: 3, is_latest: true }

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📥 Download AMD64 Artifact
        uses: actions/download-artifact@v8
        with:
          name: ext-package-${{ matrix.pg_version.major }}-amd64
          path: artifacts/amd64/

      - name: 📥 Download ARM64 Artifact
        uses: actions/download-artifact@v8
        with:
          name: ext-package-${{ matrix.pg_version.major }}-arm64
          path: artifacts/arm64/

      - name: 🏷️ Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: rixl/snowid-${{ matrix.pg_provider }}
          tags: |
            type=raw,value=${{ matrix.pg_version.major }}.${{ matrix.pg_version.minor }}
            type=raw,value=${{ matrix.pg_version.major }},enable=${{ matrix.pg_version.is_latest }}

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Login to Docker Hub
        if: ${{ inputs.publish_images }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Build and Push
        uses: docker/build-push-action@v7
        with:
          file: ./images/${{ matrix.pg_provider }}/Dockerfile
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.publish_images == true }}
          build-args: |
            PG_MAJOR=${{ matrix.pg_version.major }}
            PG_MINOR=${{ matrix.pg_version.minor }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.pg_provider }}-${{ matrix.pg_version.major }}.${{ matrix.pg_version.minor }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.pg_provider }}-${{ matrix.pg_version.major }}.${{ matrix.pg_version.minor }}