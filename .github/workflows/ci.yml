name: SnowID Extension

on:
  pull_request:
    branches: [ main ]
  workflow_call:
    inputs:
      publish_images:
        description: "Whether to publish images to Docker Hub"
        type: boolean
        default: false

jobs:
  compile:
    name: Compile (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      matrix:
        pg_major: [ 18 ]
        arch: [ amd64, arm64 ]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}-${{ matrix.pg_major }}

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: clang gcc git libssl-dev make pkg-config postgresql-server-dev-${{ matrix.pg_major }}
          version: 1.0

      - name: Install dependencies (fallback/additional)
        run: |
          # Add PostgreSQL repo if not already handled by the cache action's installation
          if ! command -v pg_config &> /dev/null; then
            curl -sSfL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
            echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
            sudo apt-get update
            sudo apt-get install -y postgresql-server-dev-${{ matrix.pg_major }}
          fi

      - name: Get pgrx version
        id: pgrx-version
        run: echo "version=$(yq '.dependencies.pgrx' Cargo.toml)" >> $GITHUB_OUTPUT

      - name: Cache cargo-pgrx
        id: cache-pgrx
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: ${{ matrix.arch }}-pgrx-${{ steps.pgrx-version.outputs.version }}

      - name: Install cargo-pgrx
        if: steps.cache-pgrx.outputs.cache-hit != 'true'
        run: |
          PGRX_VER=$(yq '.dependencies.pgrx' Cargo.toml)
          cargo install cargo-pgrx --version "$PGRX_VER" --locked

      - name: Initialize pgrx
        run: cargo pgrx init --pg${{ matrix.pg_major }} $(which pg_config)

      - name: Build package
        run: cargo pgrx package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.pg_major }}-${{ matrix.arch }}
          path: target/release/pg_snowid-pg${{ matrix.pg_major }}

  build_and_push:
    name: Build and Publish
    needs: compile
    runs-on: ubuntu-latest

    strategy:
      matrix:
        pg_provider: [ pg, cloudnative-pg ]
        pg_version:
          - { major: 18, minor: 1, is_latest: false }
          - { major: 18, minor: 2, is_latest: false }
          - { major: 18, minor: 3, is_latest: true }

    outputs:
      short_sha: ${{ steps.versions.outputs.SHORT_SHA }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: package-${{ matrix.pg_version.major }}-amd64
          path: artifacts/amd64/pg_snowid-pg${{ matrix.pg_version.major }}

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: package-${{ matrix.pg_version.major }}-arm64
          path: artifacts/arm64/pg_snowid-pg${{ matrix.pg_version.major }}

      - name: Set version strings
        id: versions
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "TAG_VER=$(yq '.extension.version' Trunk.toml)" >> $GITHUB_OUTPUT
          echo "PGRX_VER=$(yq '.dependencies.pgrx' Cargo.toml)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: ${{ inputs.publish_images }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker tags
        id: docker_tags
        run: |
          TAGS="rixl/snowid-${{ matrix.pg_provider }}:${{ matrix.pg_version.major }}.${{ matrix.pg_version.minor }}"
          if [ "${{ matrix.pg_version.is_latest }}" == "true" ]; then
            TAGS="$TAGS,rixl/snowid-${{ matrix.pg_provider }}:${{ matrix.pg_version.major }}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push -- Releases
        uses: docker/build-push-action@v7
        with:
          file: ./images/${{ matrix.pg_provider }}/Dockerfile
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.publish_images || false }}
          build-args: |
            PG_MAJOR=${{ matrix.pg_version.major }}
            PG_MINOR=${{ matrix.pg_version.minor }}
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.pg_provider }}-${{ matrix.pg_version.major }}.${{ matrix.pg_version.minor }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.pg_provider }}-${{ matrix.pg_version.major }}.${{ matrix.pg_version.minor }}