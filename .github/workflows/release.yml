name: release-please

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJSON(steps.release.outputs.prs)[0].headBranchName }}

      - name: Generate migration script
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          NEW_VERSION="${{ steps.release.outputs.version }}"
          LAST_MIGRATION=$(ls sql/pg_snowid--*.sql | sort -V | tail -n1)
          OLD_VERSION=$(echo $LAST_MIGRATION | grep -oP 'pg_snowid--[0-9.]*--?\K[0-9.]+(?=\.sql)')
          
          if [ ! -f "sql/pg_snowid--${OLD_VERSION}--${NEW_VERSION}.sql" ]; then
            echo "-- Upgrade script for pg_snowid from version $OLD_VERSION to $NEW_VERSION" > "sql/pg_snowid--${OLD_VERSION}--${NEW_VERSION}.sql"
            echo "-- No SQL schema changes in this version. Underlying library updated." >> "sql/pg_snowid--${OLD_VERSION}--${NEW_VERSION}.sql"
          
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "sql/pg_snowid--${OLD_VERSION}--${NEW_VERSION}.sql"
            git commit -m "chore: add migration script for ${NEW_VERSION}"
            git push
          fi

  release-build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    uses: ./.github/workflows/ci.yml
    with:
      publish_images: true
    secrets: inherit